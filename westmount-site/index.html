<!-- DEV: Load sections dynamically for preview -->
<script>
(function() {
  const sections = [
    ['section-nav', '00-nav.html'],
    ['section-hero', '01-hero.html'],
    ['section-stakes', '02-stakes.html'],
    ['section-stats', '03-stats.html'],
    ['section-part1-banner', '04-part1-banner.html'],
    ['section-history', '05-history.html'],
    ['section-ditch-band', '06-ditch-band.html'],
    ['section-site', '07-site.html'],
    ['section-record', '08-record.html'],
    ['section-contradictions', '09-contradictions.html'],
    ['section-double-standard', '10-double-standard.html'],
    ['section-disclosure', '11-disclosure.html'],
    ['section-rebuttals', '12-rebuttals.html'],
    ['section-part2-banner', '13-part2-banner.html'],
    ['section-housing-demand', '14-housing-demand.html'],
    ['section-seniors', '15-seniors.html'],
    ['section-province', '16-province.html'],
    ['section-chilling', '17-chilling.html'],
    ['section-demands', '18-demands.html'],
    ['section-escalation', '19-escalation.html'],
    ['section-closing-footer', '20-closing-footer.html'],
  ];

  // Load all sections, then init JS
  let loaded = 0;
  sections.forEach(function([id, file]) {
    fetch('sections/' + file)
      .then(r => r.text())
      .then(html => {
        const el = document.getElementById(id);
        if (el) el.outerHTML = html;
        loaded++;
        if (loaded === sections.length) {
          // All loaded — now init the main script
          const s = document.createElement('script');
          s.src = 'js/main.js';
          document.body.appendChild(s);
        }
      })
      .catch(() => {
        loaded++;
        console.warn('Could not load sections/' + file);
      });
  });
})();
</script>
