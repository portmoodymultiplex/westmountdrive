<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="s-nav"></div>
<div id="s-hero"></div>

<div id="s-footer"></div>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<script>
(function() {
  const sections = [
    ['s-nav',        '00-nav.html'],
    ['s-hero',       '01-hero.html'],
    ['s-who',        '01a-who-we-are.html'],
    ['s-vision',     '01b-vision.html'],
    ['s-stats',      '03-stats.html'],
    ['s-community',  '03a-community.html'],
    ['s-street',     '03b-street.html'],
    ['s-p1',         '04-part1-banner.html'],
    ['s-letters',    '04b-letters.html'],
    ['s-ditch',      '06-ditch-band.html'],
    ['s-site',       '07-site.html'],
    ['s-record',     '08-record.html'],
    ['s-double',     '10-double-standard.html'],
    ['s-conduct',    '10a-staff-conduct.html'],
    ['s-p2',         '13-part2-banner.html'],
    ['s-compare',    '13a-city-comparison.html'],
    ['s-province',   '16-province.html'],
    ['s-memo',       '16a-memo.html'],
    ['s-stuck',      '17a-stuck.html'],
    ['s-demands',    '18-demands.html'],
    ['s-escalation', '19-escalation.html'],
    ['s-footer',     '20-closing-footer.html'],
  ];

  let loaded = 0;
  sections.forEach(function([id, file]) {
    fetch('sections/' + file)
      .then(r => r.text())
      .then(html => {
        const el = document.getElementById(id);
        if (el) el.outerHTML = html;
        loaded++;
        if (loaded === sections.length) {
          const s = document.createElement('script');
          s.src = 'js/main.js';
          document.body.appendChild(s);
        }
      })
      .catch(() => {
        loaded++;
        console.warn('Could not load sections/' + file);
      });
  });
})();
</script>

</body>
</html>
